name: Build and Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/**'
  workflow_dispatch:
    inputs:
      build_profile:
        description: 'Build profile (preview or production-apk)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production-apk

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test -- --runInBand

      - name: Secret scan
        run: npm run security:scan-secrets

  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    needs: quality-gates
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
      download_url: ${{ steps.build.outputs.download_url }}
      version: ${{ steps.version.outputs.version }}
      build_number: ${{ steps.version.outputs.build_number }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate production secrets
        if: ${{ (github.event.inputs.build_profile || 'preview') == 'production-apk' }}
        env:
          EXPO_PUBLIC_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run security:verify-secrets:production

      - name: Get version info
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          BUILD_NUMBER=$(node -p "require('./app.json').expo.android?.versionCode || '1'")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "Version: $VERSION, Build: $BUILD_NUMBER"

      - name: Build Android APK
        id: build
        run: |
          REQUESTED_PROFILE="${{ github.event.inputs.build_profile || 'preview' }}"
          PROFILE="$REQUESTED_PROFILE"
          echo "Building with profile: $PROFILE (requested: $REQUESTED_PROFILE)"

          # Trigger build
          eas build --platform android --profile $PROFILE --non-interactive --no-wait --json > build-output.json

          # Extract build ID
          BUILD_ID=$(cat build-output.json | jq -r '.[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "Build ID: $BUILD_ID"

          # Wait for build to complete (with timeout)
          echo "Waiting for build to complete..."
          TIMEOUT=1800  # 30 minutes
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "Build status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "FINISHED" ]; then
              echo "Build completed successfully!"
              DOWNLOAD_URL=$(eas build:view $BUILD_ID --json | jq -r '.artifacts.buildUrl')
              echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Build timed out after ${TIMEOUT}s"
          exit 1

      - name: Download APK
        run: |
          curl -L -o soma-health.apk "${{ steps.build.outputs.download_url }}"
          ls -lh soma-health.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: soma-health.apk
          retention-days: 30

  build-ios:
    name: Build iOS IPA
    runs-on: ubuntu-latest
    needs: quality-gates
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    outputs:
      build_id: ${{ steps.build.outputs.build_id }}
      download_url: ${{ steps.build.outputs.download_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Validate production secrets
        if: ${{ (github.event.inputs.build_profile || 'preview') == 'production-apk' }}
        env:
          EXPO_PUBLIC_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run security:verify-secrets:production

      - name: Build iOS IPA
        id: build
        run: |
          REQUESTED_PROFILE="${{ github.event.inputs.build_profile || 'preview' }}"
          IOS_PROFILE="preview"
          if [ "$REQUESTED_PROFILE" = "production-apk" ]; then
            IOS_PROFILE="production-ipa"
          fi

          eas build --platform ios --profile "$IOS_PROFILE" --non-interactive --no-wait --json > build-output.json
          BUILD_ID=$(cat build-output.json | jq -r '.[0].id')
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "iOS Build ID: $BUILD_ID"

          echo "Waiting for iOS build to complete..."
          TIMEOUT=2400
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $TIMEOUT ]; do
            STATUS=$(eas build:view $BUILD_ID --json | jq -r '.status')
            echo "Build status: $STATUS (${ELAPSED}s elapsed)"

            if [ "$STATUS" = "FINISHED" ]; then
              DOWNLOAD_URL=$(eas build:view $BUILD_ID --json | jq -r '.artifacts.buildUrl')
              echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Build timed out after ${TIMEOUT}s"
          exit 1

      - name: Download IPA
        run: |
          curl -L -o soma-health.ipa "${{ steps.build.outputs.download_url }}"
          ls -lh soma-health.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: soma-health.ipa
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-ipa

      - name: Generate release notes
        id: notes
        run: |
          cat > release-notes.md <<'EOF'
          ## What's New in v${{ needs.build-android.outputs.version }}

          🎉 Latest build of Soma Health - Period & Wellness Companion

          ### Installation
          - Android: download `soma-health.apk` below and install from browser/file manager.
          - iOS: download `soma-health.ipa` below and install with Apple Configurator 2, MDM, or your iOS distribution workflow.

          ### Features
          - Period tracking with calendar view
          - Health insights and analytics
          - Secure data sync with Supabase
          - Privacy-focused design

          ### Build Info
          - Version: ${{ needs.build-android.outputs.version }}
          - Build Number: ${{ needs.build-android.outputs.build_number }}
          - Build ID: ${{ needs.build-android.outputs.build_id }}
          - Platform: Android + iOS
          - Profile: ${{ github.event.inputs.build_profile || 'preview' }}

          ### Links
          - [View Build on Expo](https://expo.dev/accounts/848deepak/projects/soma-health/builds/${{ needs.build-android.outputs.build_id }})
          - [GitHub Repository](https://github.com/848deepak/Soma)
          - [Website](https://soma-health.vercel.app)
          EOF

      - name: Create or Update Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.build-android.outputs.version }}-build.${{ needs.build-android.outputs.build_number }}
          name: Soma Health v${{ needs.build-android.outputs.version }} (Build ${{ needs.build-android.outputs.build_number }})
          body_path: release-notes.md
          files: |
            soma-health.apk
            soma-health.ipa
          draft: false
          prerelease: ${{ github.event.inputs.build_profile != 'production-apk' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-website:
    name: Update Website
    needs: [build-android, create-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update website with latest version
        run: |
          mkdir -p build-artifacts
          cd web
          mkdir -p public

          # Update version in package.json or environment
          VERSION="${{ needs.build-android.outputs.version }}"
          BUILD_NUMBER="${{ needs.build-android.outputs.build_number }}"
          BUILD_ID="${{ needs.build-android.outputs.build_id }}"
          EAS_APK_URL="${{ needs.build-android.outputs.download_url }}"
          RELEASE_APK_URL="https://github.com/${{ github.repository }}/releases/latest/download/soma-health.apk"
          IOS_IPA_URL="https://github.com/${{ github.repository }}/releases/latest/download/soma-health.ipa"

          # Create/update canonical website download metadata
          cat > public/download.json <<EOF
          {
            "version": "$VERSION",
            "buildNumber": "$BUILD_NUMBER",
            "buildId": "$BUILD_ID",
            "apkUrl": "$EAS_APK_URL",
            "downloadUrl": "$RELEASE_APK_URL",
            "iosIpaUrl": "$IOS_IPA_URL",
            "releaseUrl": "https://github.com/${{ github.repository }}/releases/latest",
            "buildDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          cat public/download.json

          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("public/download.json", "utf8"));
            if (!data.buildId || !data.version) {
              throw new Error("download.json missing buildId/version");
            }
            if (!data.downloadUrl || !/^https?:\/\//.test(data.downloadUrl)) {
              throw new Error("download.json missing valid downloadUrl");
            }
          '
          echo "✅ download.json validation passed"

          cd ..
          cat > build-artifacts/latest-build.json <<EOF
          {
            "version": "$VERSION",
            "buildNumber": "$BUILD_NUMBER",
            "buildId": "$BUILD_ID",
            "apkUrl": "$EAS_APK_URL",
            "releaseApkUrl": "$RELEASE_APK_URL",
            "releaseIpaUrl": "$IOS_IPA_URL",
            "downloadUrl": "$RELEASE_APK_URL",
            "platform": "android+ios",
            "profile": "${{ github.event.inputs.build_profile || 'preview' }}",
            "buildDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commitSha": "${{ github.sha }}",
            "commitMessage": "${{ github.event.head_commit.message || 'manual_dispatch' }}",
            "branch": "${{ github.ref_name }}"
          }
          EOF

          node -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("build-artifacts/latest-build.json", "utf8"));
            if (!data.buildId || !data.version || !data.apkUrl) {
              throw new Error("latest-build.json missing required metadata");
            }
          '
          echo "✅ latest-build.json validation passed"

      - name: Commit version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build-artifacts/latest-build.json
          git add web/public/download.json
          git diff --staged --quiet || git commit -m "chore: update build metadata for ${{ needs.build-android.outputs.version }} [skip ci]"
          git push

      - name: Trigger Vercel deployment (optional)
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        if: env.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -X POST "$VERCEL_DEPLOY_HOOK"

  notify:
    name: Send Notification
    needs: [build-android, build-ios, create-release, update-website]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Build Success Notification
        if: needs.build-android.result == 'success'
        run: |
          echo "✅ Build completed successfully!"
          echo "Version: ${{ needs.build-android.outputs.version }}"
          echo "Download: https://github.com/848deepak/Soma/releases/latest"
          echo "Build URL: https://expo.dev/accounts/848deepak/projects/soma-health/builds/${{ needs.build-android.outputs.build_id }}"

      - name: Build Failure Notification
        if: needs.build-android.result == 'failure'
        run: |
          echo "❌ Build failed"
          echo "Check logs: https://expo.dev/accounts/848deepak/projects/soma-health/builds/${{ needs.build-android.outputs.build_id }}"
          exit 1
