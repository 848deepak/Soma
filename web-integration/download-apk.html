<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Download Soma App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
        font-size: 2em;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
      }
      .download-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
        color: white;
        padding: 16px 32px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        text-decoration: none;
      }
      .download-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(236, 72, 153, 0.6);
      }
      .download-btn:disabled {
        background: #ccc;
        cursor: not-allowed;
        box-shadow: none;
      }
      .download-btn svg {
        width: 24px;
        height: 24px;
        margin-right: 10px;
      }
      .build-info {
        margin-top: 20px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 8px;
        font-size: 14px;
        color: #555;
      }
      .version-badge {
        display: inline-block;
        background: #e0e7ff;
        color: #4f46e5;
        padding: 4px 12px;
        border-radius: 20px;
        font-weight: 600;
        margin: 10px 0;
      }
      .loading {
        color: #666;
        font-size: 16px;
      }
      .error {
        color: #dc2626;
        padding: 15px;
        background: #fee;
        border-radius: 8px;
        font-size: 14px;
      }
      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #ec4899;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 20px auto;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📱 Soma App</h1>
      <p class="subtitle">AI-Powered Women's Health Tracker</p>

      <div id="download-section">
        <!-- Content will be injected here -->
      </div>
    </div>

    <script>
      const GITHUB_USERNAME = "YOUR_GITHUB_USERNAME"; // Change this
      const GITHUB_REPO = "YOUR_GITHUB_REPO"; // Change this
      const BUILD_METADATA_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/build-artifacts/latest-build.json`;

      async function fetchLatestBuild() {
        const section = document.getElementById("download-section");

        // Show loading state
        section.innerHTML = `
        <div class="spinner"></div>
        <p class="loading">Loading latest build...</p>
      `;

        try {
          const response = await fetch(BUILD_METADATA_URL, {
            cache: "no-cache", // Always get latest
          });

          if (!response.ok) {
            throw new Error("Failed to fetch build metadata");
          }

          const buildData = await response.json();

          // Display download button and info
          section.innerHTML = `
          <a
            href="${buildData.apkUrl}"
            target="_blank"
            rel="noopener noreferrer"
            class="download-btn"
          >
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
            </svg>
            Download Latest APK
          </a>

          <div class="build-info">
            <span class="version-badge">v${buildData.version}</span>
            <p style="margin-top: 10px; font-size: 13px;">
              Built on ${new Date(buildData.buildDate).toLocaleDateString(
                "en-US",
                {
                  year: "numeric",
                  month: "long",
                  day: "numeric",
                },
              )}
            </p>
            <p style="margin-top: 5px; font-size: 12px; color: #888;">
              Build ID: ${buildData.buildId.substring(0, 8)}...
            </p>
          </div>
        `;
        } catch (error) {
          section.innerHTML = `
          <div class="error">
            <strong>⚠️ Unable to load latest build</strong>
            <p style="margin-top: 5px; font-size: 13px;">
              ${error.message}
            </p>
          </div>
        `;
        }
      }

      // Fetch build data on page load
      fetchLatestBuild();
    </script>
  </body>
</html>
